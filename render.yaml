services:
  - type: web
    name: adyapan-api
    env: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false   # Set to your Vercel URL
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
